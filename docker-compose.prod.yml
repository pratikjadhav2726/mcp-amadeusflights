version: '3.8'

services:
  mcp-amadeusflights:
    build: .
    image: mcp-amadeusflights:prod
    container_name: mcp-amadeusflights-prod
    environment:
      - NODE_ENV=production
      - AMADEUS_CLIENT_ID=${AMADEUS_CLIENT_ID}
      - AMADEUS_CLIENT_SECRET=${AMADEUS_CLIENT_SECRET}
      - AMADEUS_ENVIRONMENT=${AMADEUS_ENVIRONMENT:-test}
      - MCP_SERVER_VERSION=${MCP_SERVER_VERSION:-1.1.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HTTP_PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ports:
      - "127.0.0.1:3000:3000"  # Expose to localhost only for nginx reverse proxy
    networks:
      - travel-network  # Connect to the same network as travel-platform-deployment
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  travel-network:
    external: true  # Use the existing network from travel-platform-deployment

